<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yuvraj Malik | Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!--
      Keep body visible by default so the preloader itself can render.
      Preloader still toggles body classes, but content is never fully hidden.
    -->
    <style>
      body { opacity: 1; }
      body.ready {
        opacity: 1;
        transition: opacity 400ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      body.ready-instant { opacity: 1; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
