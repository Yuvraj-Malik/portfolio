<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yuvraj Malik | Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── Page fade-in ── -->
    <style>
      body {
        opacity: 0;
        transform: translateY(6px);
      }
      body.loaded {
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity 500ms cubic-bezier(0.16, 1, 0.3, 1),
          transform 500ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      body.no-fade {
        opacity: 1;
        transform: translateY(0);
        transition: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Vite entry -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Fade-in trigger — must be last in body ── -->
    <script>
      (function () {
        var nav = performance.getEntriesByType("navigation")[0];
        var isReload = nav && nav.type === "reload";

        if (isReload) {
          document.body.classList.add("no-fade");
        } else {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              document.body.classList.add("loaded");
            });
          });
        }
      })();
    </script>
  </body>
</html>
